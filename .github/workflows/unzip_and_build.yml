name: Universal Native Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-33
            build-tools;33.0.0

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Extract zip dengan handle spasi dan nested zip
      - name: Extract Main Zip
        run: |
          # Cari file zip utama (handle spasi)
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" -not -name "*kontrol*" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "❌ Tidak ditemukan file zip!"
            exit 1
          fi
          
          echo "📦 Extracting: $ZIP_FILE"
          unzip -o "$ZIP_FILE"
          
          # Hapus zip setelah extract
          rm "$ZIP_FILE"

      # Cari folder android dan build
      - name: Build Android APK
        run: |
          # Cari folder android (tapi exclude yang di .github)
          ANDROID_DIR=$(find . -type d -name "android" -not -path "./.github/*" | head -n 1)
          
          if [ -z "$ANDROID_DIR" ]; then
            echo "❌ Folder android tidak ditemukan!"
            echo "📂 Isi direktori:"
            ls -la
            exit 1
          fi
          
          echo "🎯 Found android at: $ANDROID_DIR"
          cd "$ANDROID_DIR"
          
          # Cek gradlew
          if [ ! -f "gradlew" ]; then
            echo "❌ gradlew not found!"
            exit 1
          fi
          
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hasil-Base-APK-Native
          path: |
            **/build/outputs/apk/release/*.apk
            **/build/outputs/apk/debug/*.apk
          continue-on-error: true
