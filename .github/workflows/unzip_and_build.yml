name: Universal Native Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Script ini akan otomatis mendeteksi file .zip apa saja di repo kamu tanpa peduli namanya
      - name: Extract Any Zip File
        run: |
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "✅ Menemukan berkas arsip: $ZIP_FILE"
            unzip -o "$ZIP_FILE"
            rm "$ZIP_FILE"
          else
            echo "❌ Tidak ditemukan file .zip sama sekali di halaman utama repo!"
            exit 1
          fi

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Mencari otomatis di mana letak folder android kamu berada
      - name: Locate Android and Build
        run: |
          ANDROID_DIR=$(find . -type d -name "android" | head -n 1)
          if [ -n "$ANDROID_DIR" ]; then
            echo "🎯 Folder android ditemukan di: $ANDROID_DIR"
            cd "$ANDROID_DIR"
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            echo "❌ Folder bernama 'android' tidak ditemukan di dalam ZIP kamu!"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hasil-Base-APK-Native
          path: |
            **/build/outputs/apk/release/*.apk
            **/build/outputs/apk/debug/*.apk
