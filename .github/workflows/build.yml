name: Build KawakunChan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Download Base from Release
        run: |
          curl -L -o base.zip \
            https://github.com/KawakunChan/Db/releases/download/v1.0.0/otax.zip
          if [ -f "base.zip" ]; then
            echo "✅ Download sukses!"
            unzip -o base.zip
            rm base.zip
            
            if [ -d "otax" ]; then
              echo "📂 Menemukan folder 'otax'. Memindahkan isinya..."
              mv otax/* . 2>/dev/null || true
              mv otax/.* . 2>/dev/null || true
              rm -rf otax
            fi

            if [ -f "pubspec.yaml" ]; then
              echo "🛠️ Melakukan konfigurasi otomatis pada pubspec.yaml..."
              sed -i '/sdk:.*[0-9]/s/sdk:.*/sdk: ">=3.5.0 <4.0.0"/' pubspec.yaml
              sed -i 's/flutter_lints: .*/flutter_lints: ^3.0.0/g' pubspec.yaml
              echo -e "\ndependency_overrides:\n  path: 1.9.0\n  meta: 1.15.0" >> pubspec.yaml
            fi

          else
            echo "❌ Download gagal!"
            exit 1
          fi

      - name: Generate Debug Keystore
        run: |
          mkdir -p android/app
          cd android/app
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"

      - name: Build Release APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p output
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            cp build/app/outputs/flutter-apk/app-release.apk output/SyncXxX.apk
          else
            find android/app/build/outputs/apk/release/ -name "*.apk" | head -1 | xargs -I{} cp {} output/SyncXxX.apk
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberPro-APK
          path: output/SyncXxX.apk
          retention-days: 30
