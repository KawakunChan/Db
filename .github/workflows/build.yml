name: Build KawakunChan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          channel: 'stable'

      - name: Download and Patch Base
        run: |
          curl -L -o base.zip https://github.com/KawakunChan/Db/releases/download/v1.0.0/otax.zip
          unzip -o base.zip
          sed -i 's/await commentum.listComments(widget.mediaId.toString(),/await commentum.listComments(/g' lib/ui/models/bottom_sheets/commentSection.dart || true
          if [ -f "pubspec.yaml" ]; then
             sed -i '/sdk:.*[0-9]/s/sdk:.*/sdk: ">=3.6.0 <5.0.0"/' pubspec.yaml
             echo -e "\ndependency_overrides:\n  path: 1.9.0\n  meta: 1.15.0\n  xml: 6.5.0\n  app_links: 6.4.1" >> pubspec.yaml
          fi
          cat <<EOF > android/gradle.properties
          org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
          android.useAndroidX=true
          android.enableJetifier=true
          android.newDsl=false
          org.gradle.configuration-cache=false
          org.gradle.caching=false
          org.gradle.vfs.watch=false
          org.gradle.parallel=true
          org.gradle.daemon=true
          EOF

      - name: Build Release APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --verbose

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CyberPro-APK
          path: build/app/outputs/flutter-apk/app-release.apk
