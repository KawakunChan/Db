name: Build KawakunChan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          channel: 'stable'

      - name: Download and Patch Base
        run: |
          curl -L -o base.zip https://github.com/KawakunChan/Db/releases/download/v1.0.0/otax.zip
          unzip -o base.zip
          
          sed -i 's/await commentum.listComments(widget.mediaId.toString(),/await commentum.listComments(/g' lib/ui/models/bottom_sheets/commentSection.dart || true

          cat <<EOF > lib/core/database/commentum/commentumTokenStore.dart
          import 'package:commentum_client/commentum_client.dart';
          import 'package:flutter_secure_storage/flutter_secure_storage.dart';

          class CommentumTokenStore extends CommentumStorage {
            String _providerKey(CommentumProvider provider) => "commentum_\${provider.name}_token";

            final _fss = const FlutterSecureStorage();

            @override
            Future<void> clearAll() async {
              for (final provider in CommentumProvider.values) {
                await _fss.delete(key: _providerKey(provider));
              }
            }

            @override
            Future<void> deleteToken(CommentumProvider provider) {
              return _fss.delete(key: _providerKey(provider));
            }

            @override
            Future<String?> getToken(CommentumProvider provider) {
              return _fss.read(key: _providerKey(provider));
            }

            @override
            Future<void> saveToken(CommentumProvider provider, String token) {
              return _fss.write(key: _providerKey(provider), value: token);
            }

            @override
            Future<Map<CommentumProvider, String>> getAllTokens() async {
              final tokens = <CommentumProvider, String>{};
              for (final provider in CommentumProvider.values) {
                final token = await _fss.read(key: _providerKey(provider));
                if (token != null) {
                  tokens[provider] = token;
                }
              }
              return tokens;
            }
          }
          EOF

          if [ -f "pubspec.yaml" ]; then
             sed -i '/sdk:.*[0-9]/s/sdk:.*/sdk: ">=3.6.0 <5.0.0"/' pubspec.yaml
             echo -e "\ndependency_overrides:\n  path: 1.9.0\n  meta: 1.15.0\n  xml: 6.5.0\n  app_links: 6.4.1" >> pubspec.yaml
          fi

      - name: Build Release APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberPro-APK
          path: build/app/outputs/flutter-apk/app-release.apk
